<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austral Collector - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #1a100b; --bg-gradient: radial-gradient(circle at top, #2b1b13 0%, #0f0906 100%); --bronce-gold: #d59c3e; --crimson-rust: #852b10; --text-light: #e0e0e0; }
        body { background: var(--bg-gradient); background-color: var(--bg-base); background-attachment: fixed; color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        h1, h2, h3, .brand-font { font-family: 'Cinzel', serif; color: var(--bronce-gold); text-shadow: 0 2px 4px rgba(0,0,0,1); }
        .navbar { background-color: rgba(43, 27, 19, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 2px solid var(--bronce-gold); padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 30px rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; }
        .navbar-brand { display: flex; align-items: center; gap: 20px; text-decoration: none; }
        .navbar-brand img { height: 55px; filter: drop-shadow(0 0 8px rgba(213, 156, 62, 0.3)); transition: transform 0.3s ease; }
        .navbar-brand:hover img { transform: scale(1.05); }
        .navbar-brand span { font-size: 26px; letter-spacing: 3px; color: var(--bronce-gold); text-shadow: 0 0 15px rgba(213, 156, 62, 0.4); }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--text-light); text-decoration: none; text-transform: uppercase; font-size: 14px; letter-spacing: 1.5px; transition: all 0.3s ease; font-weight: 600; }
        .nav-links a:hover { color: var(--bronce-gold); text-shadow: 0 0 8px rgba(213, 156, 62, 0.5); }
        .nav-btn-primary { background: linear-gradient(135deg, var(--crimson-rust) 0%, #5c1b0a 100%); color: #ffffff !important; padding: 10px 28px; border: 1px solid var(--bronce-gold); border-radius: 3px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .nav-btn-primary:hover { background: linear-gradient(135deg, #a33514 0%, var(--crimson-rust) 100%); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(133, 43, 16, 0.6); }
        .container { padding: 50px 40px; max-width: 1200px; margin: 0 auto; flex-grow: 1; }
        .footer-area { background-color: #0f0906; border-top: 1px solid var(--bronce-gold); padding: 40px; margin-top: 60px; text-align: center; }
        .footer-area h3 { margin-top: 0; margin-bottom: 15px; }
        .footer-links a { color: var(--crimson-rust); text-decoration: none; margin: 0 15px; font-weight: bold; transition: color 0.3s; }
        .footer-links a:hover { color: var(--bronce-gold); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <img src="src/assets/img/logo.png" alt="Logo Austral">
            <span class="brand-font">AUSTRAL COLLECTOR</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="#contacto">Contacto</a>
            <a href="login.html" id="btn-login" class="nav-btn-primary" style="display:none;">Login</a>
        </div>
    </nav>
    
    <div class="container" style="max-width: 500px; padding-top: 80px;">
        <div style="background-color: rgba(43, 27, 19, 0.85); padding: 40px; border: 1px solid var(--bronce-gold); border-radius: 4px; box-shadow: 0 4px 30px rgba(0,0,0,0.8);">
            <h1 style="margin-top: 0; font-size: 28px;">GRIMORIO DE ACCESO</h1>
            <p style="margin-bottom: 30px; color: #a0a0a0;">Identifícate para entrar a la bóveda.</p>
            
            <div id="error-msg" style="color: #ffaa99; background: rgba(133, 43, 16, 0.4); padding: 10px; border-left: 3px solid var(--crimson-rust); margin-bottom: 20px; display: none; font-size: 14px; text-align: left;"></div>

            <form id="login-form">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: var(--bronce-gold); font-size: 14px; letter-spacing: 1px;">Usuario</label>
                    <input type="text" id="username" placeholder="Ej: prueba1" style="width: 100%; box-sizing: border-box; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #5c1b0a; color: var(--text-light); font-family: 'Inter', sans-serif; outline: none;" required>
                </div>
                <div style="margin-bottom: 30px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: var(--bronce-gold); font-size: 14px; letter-spacing: 1px;">Palabra de Paso</label>
                    <input type="password" id="password" placeholder="••••••" style="width: 100%; box-sizing: border-box; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #5c1b0a; color: var(--text-light); font-family: 'Inter', sans-serif; outline: none;" required>
                </div>
                <button type="submit" class="nav-btn-primary" style="width: 100%; font-size: 16px; letter-spacing: 2px; cursor:pointer;">DESBLOQUEAR</button>
            </form>
        </div>
    </div>

    <!-- Script de Login para validar contra users.json -->
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            fetch('users.json')
                .then(response => response.json())
                .then(users => {
                    const validUser = users.find(u => u.username === userVal && u.password === passVal);
                    if (validUser) {
                        errorDiv.style.display = 'none';
                        sessionStorage.setItem('loggedUser', JSON.stringify(validUser));
                        window.location.href = 'admin.html';
                    } else {
                        errorDiv.style.display = 'block';
                        errorDiv.innerText = 'Usuario o palabra de paso incorrectos. Las reliquias permanecen selladas.';
                    }
                })
                .catch(err => {
                    console.error("Error al cargar users.json:", err);
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = 'Error interno verificando credenciales.';
                });
        });
    </script>

    <!-- Footer de Contacto -->
    <footer id="contacto" class="footer-area">
        <h3 class="brand-font">Contacto y Soporte</h3>
        <p>Email: gremio@australcollector.cl <br> Teléfono: +56 9 1234 5678</p>
        <div class="footer-links">
            <a href="#soporte" onclick="alert('Soporte en construcción')">Soporte</a>
            <a href="#terminos">Términos y Condiciones</a>
        </div>
    </footer>
</body>
</html>
