<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUSTRAL-COLLECTOR</title>
    <!-- Google Fonts: Outfit for modern, premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-primary: #ffffff;
            --accent-glow: rgba(69, 250, 211, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-primary);
        }

        /* Abstract blurred background shapes for a premium dark mode aesthetic */
        .ambient-light {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(100px);
            z-index: 0;
            animation: pulse-light 8s infinite alternate ease-in-out;
            pointer-events: none;
        }

        /* Glassmorphism container */
        .glass-container {
            position: relative;
            z-index: 1;
            padding: 4rem 6rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); /* Subtle border for glass effect */
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fade-in-up 1.2s ease-out;
        }

        .glass-container:hover {
            transform: translateY(-10px) scale(1.02);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        h1 {
            margin: 0;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 30%, #a2a2a2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            position: relative;
        }

        /* Reveal and float animations */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-light {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .glass-container {
                padding: 3rem 2rem;
                margin: 0 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>
    
    <div class="glass-container">
        <h1>AUSTRAL-COLLECTOR</h1>
    </div>

</body>
</html>
