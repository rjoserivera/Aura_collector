<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austral Collector - Perfil</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-base: #1a100b;
            --bg-gradient: radial-gradient(circle at top, #2b1b13 0%, #0f0906 100%);
            --bronce-gold: #d59c3e;
            --crimson-rust: #852b10;
            --text-light: #e0e0e0;
        }

        body {
            background: var(--bg-gradient);
            background-color: var(--bg-base);
            background-attachment: fixed;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Cinzel', serif;
            color: var(--bronce-gold);
        }

        /* NAVBAR */
        .navbar {
            background-color: rgba(43, 27, 19, 0.85);
            border-bottom: 2px solid var(--bronce-gold);
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .navbar-brand img {
            height: 50px;
        }

        .navbar-brand span {
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--bronce-gold);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
        }

        .nav-btn-primary {
            background: var(--crimson-rust);
            padding: 8px 20px;
            border: 1px solid var(--bronce-gold);
        }

        /* CONTENEDOR */
        .container {
            padding: 40px;
            max-width: 1100px;
            margin: auto;
            flex-grow: 1;
        }

        /* PERFIL */
        .profile-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--bronce-gold);
            padding: 30px;
            border-radius: 8px;
        }

        .profile-header {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border: 2px solid var(--bronce-gold);
            border-radius: 6px;
            object-fit: cover;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            flex: 1;
            text-align: center;
            border: 1px solid var(--bronce-gold);
            padding: 15px;
        }

        .games {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .games img {
            width: 150px;
            height: 80px;
            object-fit: cover;
            border: 1px solid var(--bronce-gold);
        }

        .badges {
            display: flex;
            gap: 10px;
        }

        .badge {
            flex: 1;
            text-align: center;
            border: 1px solid var(--bronce-gold);
            padding: 10px;
        }

        /* FOOTER */
        .footer-area {
            background-color: #0f0906;
            border-top: 1px solid var(--bronce-gold);
            padding: 30px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <img src="src/assets/img/logo.png">
            <span class="brand-font">AUSTRAL COLLECTOR</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="#contacto">Contacto</a>
            <a href="login.html" id="btn-login" class="nav-btn-primary">Login</a>

            <div id="user-menu" style="display:none;">
                <button id="user-btn">
                    <span id="user-name-display">Usuario</span> ▼
                </button>

                <div id="user-dropdown" style="display:none; position:absolute; background:black;">
                    <a href="perfil.html">Perfil</a>
                    <a href="#" id="btn-logout">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container">

        <h1>PERFIL</h1>

        <div class="profile-card">

            <div class="profile-header">
                <!-- IMAGEN 1 COMO AVATAR -->
                <img src="src/assets/img/img1.jpg" class="avatar">

                <div>
                    <h2 id="profile-name">Usuario</h2>
                    <p>Nivel 13</p>
                    <p>Miembro desde 2026</p>
                </div>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <h3>176</h3>
                    <p>Imagenes</p>
                </div>
                <div class="stat-box">
                    <h3>90</h3>
                    <p>Amigos</p>
                </div>
                <div class="stat-box">
                    <h3>167</h3>
                    <p>Likes</p>
                </div>
            </div>

            <h2>Imagenes Recientes</h2>

            <!-- IMAGENES 2 Y 3 -->
            <div class="games">
                <img src="src/assets/img/img2.jpg">
                <img src="src/assets/img/img3.jpg">
            </div>

            <h2>Reseñas</h2>
            <div class="badges">
                <div class="badge">62<br>Imagenes</div>
                <div class="badge">120<br>Reseñas</div>
                <div class="badge">192<br>Likes</div>
                <div class="badge">48<br>Insignias</div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer id="contacto" class="footer-area">
        <h3>Contacto y Soporte</h3>
        <p>Email: gremio@australcollector.cl</p>
    </footer>

    <!-- SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userData = sessionStorage.getItem('loggedUser');

            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userData);

            document.getElementById('btn-login').style.display = 'none';
            document.getElementById('user-menu').style.display = 'block';
            document.getElementById('user-name-display').textContent = user.username;
            document.getElementById('profile-name').textContent = user.username;

            document.getElementById('btn-logout').addEventListener('click', () => {
                sessionStorage.removeItem('loggedUser');
                window.location.href = 'index.html';
            });
        });
    </script>

</body>

</html>
